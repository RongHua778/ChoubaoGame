<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>抽爆游戏 · 本地预览</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        margin: 0;
        overflow: hidden;
        background: #07080d;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Noto Sans SC", "Source Han Sans SC", sans-serif;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        background: #040508;
      }

      @media (hover: hover) and (pointer: fine) and (min-width: 700px) {
        body {
          background: #111521;
        }

        canvas {
          width: min(430px, calc(100vw - 32px), calc((100vh - 32px) * 1206 / 2622));
          width: min(430px, calc(100vw - 32px), calc((100dvh - 32px) * 1206 / 2622));
          height: auto;
          max-height: calc(100vh - 32px);
          max-height: calc(100dvh - 32px);
          aspect-ratio: 1206 / 2622;
          box-shadow: 0 18px 56px rgba(0, 0, 0, 0.42);
        }
      }

      .layout-debug-toggle {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 11;
        width: 40px;
        height: 40px;
        color: #101423;
        background: #5ee7ff;
        border: 0;
        border-radius: 999px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        font: 700 18px/1 "Noto Sans SC", "Source Han Sans SC", sans-serif;
        cursor: pointer;
      }

      .layout-test-win-toggle {
        position: fixed;
        top: 60px;
        right: 12px;
        z-index: 9;
        width: 38px;
        height: 38px;
        padding: 0;
        color: #120613;
        background: #ffe071;
        border: 0;
        border-radius: 999px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        font: 700 16px/1 "Noto Sans SC", "Source Han Sans SC", sans-serif;
        cursor: pointer;
      }

      .layout-debug {
        position: fixed;
        top: 60px;
        right: 12px;
        z-index: 10;
        width: 280px;
        max-height: calc(100vh - 72px);
        overflow-y: auto;
        padding: 12px;
        color: #f4f7ff;
        background: rgba(12, 16, 28, 0.88);
        border: 1px solid rgba(94, 231, 255, 0.35);
        border-radius: 10px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        font: 12px/1.4 "Noto Sans SC", "Source Han Sans SC", sans-serif;
        backdrop-filter: blur(10px);
      }

      .layout-debug[hidden] {
        display: none;
      }

      .layout-debug-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .layout-debug h2 {
        margin: 0;
        font-size: 14px;
      }

      .layout-debug-close {
        width: 26px;
        height: 26px;
        padding: 0;
        flex: none;
      }

      .layout-debug-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(143, 155, 181, 0.22);
      }

      .layout-debug-tab {
        flex: none;
        font-size: 11px;
        padding: 4px 6px;
        color: #8f9bb5;
        background: rgba(143, 155, 181, 0.12);
      }

      .layout-debug-tab.is-active {
        color: #101423;
        background: #5ee7ff;
      }

      .layout-debug-section {
        margin-top: 10px;
        margin-bottom: 2px;
        font-size: 11px;
        font-weight: 700;
        color: rgba(143, 155, 181, 0.88);
      }

      .layout-debug-section:first-child {
        margin-top: 0;
      }

      .layout-debug-page[hidden] {
        display: none;
      }

      .layout-debug label {
        display: grid;
        grid-template-columns: 72px 1fr 42px;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }

      .layout-debug input {
        width: 100%;
      }

      .layout-debug select {
        width: 100%;
        min-width: 0;
        grid-column: 2;
        padding: 4px 6px;
        font: inherit;
        color: inherit;
        background: rgba(6, 10, 20, 0.75);
        border: 1px solid rgba(94, 231, 255, 0.28);
        border-radius: 4px;
      }

      .layout-debug input[data-layout-kind="text"] {
        grid-column: 2;
        padding: 4px 6px;
        font: inherit;
        color: inherit;
        background: rgba(6, 10, 20, 0.75);
        border: 1px solid rgba(94, 231, 255, 0.28);
        border-radius: 4px;
      }

      .layout-debug label.layout-debug-text-row {
        grid-template-columns: 88px 1fr;
      }

      .layout-debug label.layout-debug-text-row output {
        display: none;
      }

      .layout-debug output {
        color: #5ee7ff;
        text-align: right;
      }

      .layout-debug-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .layout-debug button {
        flex: 1;
        color: #101423;
        background: #5ee7ff;
        border: 0;
        border-radius: 6px;
        padding: 6px 8px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button class="layout-debug-toggle" type="button" id="layoutDebugToggle" aria-controls="layoutDebugPanel" aria-expanded="false">调</button>
    <button class="layout-test-win-toggle" type="button" id="layoutTestWinToggle" hidden aria-label="测试胜利">胜</button>
    <div class="layout-debug" id="layoutDebugPanel" hidden>
      <div class="layout-debug-header">
        <h2>布局调试</h2>
        <button class="layout-debug-close" type="button" id="layoutDebugClose" aria-label="关闭布局调试面板">×</button>
      </div>
      <div class="layout-debug-tabs" role="tablist" aria-label="布局调试分页">
        <button class="layout-debug-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="layoutDebugPageTitleMenu" data-layout-page-target="titleMenu">开始菜单</button>
        <button class="layout-debug-tab" type="button" role="tab" aria-selected="false" aria-controls="layoutDebugPageThreshold" data-layout-page-target="threshold">阈值 UI</button>
        <button class="layout-debug-tab" type="button" role="tab" aria-selected="false" aria-controls="layoutDebugPagePanels" data-layout-page-target="panels">双方区域</button>
        <button class="layout-debug-tab" type="button" role="tab" aria-selected="false" aria-controls="layoutDebugPageCenter" data-layout-page-target="center">中央与控件</button>
        <button class="layout-debug-tab" type="button" role="tab" aria-selected="false" aria-controls="layoutDebugPageWidgets" data-layout-page-target="widgets">侧栏牌组</button>
        <button class="layout-debug-tab" type="button" role="tab" aria-selected="false" aria-controls="layoutDebugPageBorders" data-layout-page-target="borders">战斗边框</button>
      </div>
      <div class="layout-debug-page" id="layoutDebugPageTitleMenu" role="tabpanel" data-layout-page="titleMenu">
        <div class="layout-debug-section">LOGO</div>
        <label>
          最大宽度比
          <input type="range" min="0.55" max="1.08" step="0.01" data-layout-page="titleMenu" data-layout-key="logoMaxWidthRatio" />
          <output></output>
        </label>
        <label>
          宽度上限
          <input type="range" min="240" max="430" step="1" data-layout-page="titleMenu" data-layout-key="logoMaxWidthCap" />
          <output></output>
        </label>
        <label>
          顶部留白比
          <input type="range" min="0" max="0.32" step="0.001" data-layout-page="titleMenu" data-layout-key="logoTopRatio" />
          <output></output>
        </label>
        <label class="layout-debug-text-row">
          缺图占位字
          <input type="text" data-layout-page="titleMenu" data-layout-key="fallbackLogoTextWhenNoImage" data-layout-kind="text" placeholder="可为空" />
          <output>—</output>
        </label>
        <div class="layout-debug-section">开始游戏按钮</div>
        <label>
          宽度模式
          <select data-layout-page="titleMenu" data-layout-key="startButtonWidthMode" data-layout-kind="select">
            <option value="draw">与抽牌同宽（居中）</option>
            <option value="full">整条控件同宽</option>
          </select>
          <output></output>
        </label>
        <label>
          按钮高度
          <input type="range" min="0" max="72" step="1" data-layout-page="titleMenu" data-layout-key="startButtonHeight" />
          <output></output>
        </label>
        <label>
          按钮宽度
          <input type="range" min="0" max="400" step="1" data-layout-page="titleMenu" data-layout-key="startButtonWidth" />
          <output></output>
        </label>
        <label>
          垂直位置比
          <input type="range" min="-1" max="1" step="0.001" data-layout-page="titleMenu" data-layout-key="startButtonYRatio" />
          <output></output>
        </label>
        <label>
          垂直微调 px
          <input type="range" min="-80" max="80" step="1" data-layout-page="titleMenu" data-layout-key="startButtonYOffset" />
          <output></output>
        </label>
        <label>
          水平锚点比
          <input type="range" min="-1" max="1" step="0.001" data-layout-page="titleMenu" data-layout-key="startButtonCenterXRatio" />
          <output></output>
        </label>
        <div class="layout-debug-section">载入提示（可选）</div>
        <label>
          显示载入字
          <input type="range" min="0" max="1" step="1" data-layout-page="titleMenu" data-layout-key="showBootstrapLoadingHint" />
          <output></output>
        </label>
        <label>
          载入字 Y 比
          <input type="range" min="0.35" max="0.72" step="0.001" data-layout-page="titleMenu" data-layout-key="bootstrapLoadingHintYRatio" />
          <output></output>
        </label>
        <label>
          载入字号
          <input type="range" min="10" max="18" step="1" data-layout-page="titleMenu" data-layout-key="bootstrapLoadingHintSize" />
          <output></output>
        </label>
        <div class="layout-debug-section" style="font-weight: 400; color: rgba(143, 155, 181, 0.75)">
          说明：按钮高度/宽度为 0 时沿用对战底部「抽牌」同款；垂直/水平比为 −1 时沿用默认对齐。
        </div>
      </div>
      <div class="layout-debug-page" id="layoutDebugPageThreshold" role="tabpanel" data-layout-page="threshold" hidden>
        <label>
          文案 X
          <input type="range" min="-40" max="80" step="1" data-layout-key="labelOffsetX" />
          <output></output>
        </label>
        <label>
          文案 Y
          <input type="range" min="-30" max="30" step="1" data-layout-key="labelOffsetY" />
          <output></output>
        </label>
        <label>
          点起点
          <input type="range" min="20" max="90" step="0.1" data-layout-key="pointStartX" />
          <output></output>
        </label>
        <label>
          点 Y
          <input type="range" min="-18" max="12" step="0.1" data-layout-key="pointOffsetY" />
          <output></output>
        </label>
        <label>
          点间距
          <input type="range" min="12" max="40" step="0.1" data-layout-key="pointGap" />
          <output></output>
        </label>
        <label>
          点半径
          <input type="range" min="2" max="12" step="0.1" data-layout-key="pointRadius" />
          <output></output>
        </label>
      </div>
      <div class="layout-debug-page" id="layoutDebugPagePanels" role="tabpanel" data-layout-page="panels" hidden>
        <label>
          顶部边距
          <input type="range" min="0" max="50" step="1" data-layout-key="topMargin" />
          <output></output>
        </label>
        <label>
          左右边距
          <input type="range" min="0" max="40" step="1" data-layout-key="sideMargin" />
          <output></output>
        </label>
        <label>
          区域间距
          <input type="range" min="0" max="28" step="1" data-layout-key="panelGap" />
          <output></output>
        </label>
        <label>
          控制区 Y
          <input type="range" min="0.78" max="0.95" step="0.001" data-layout-key="controlsYRatio" />
          <output></output>
        </label>
        <label>
          中央高度
          <input type="range" min="0.05" max="0.18" step="0.001" data-layout-key="centerHRatio" />
          <output></output>
        </label>
        <label>
          中央最小
          <input type="range" min="36" max="110" step="1" data-layout-key="minCenterH" />
          <output></output>
        </label>
      </div>
      <div class="layout-debug-page" id="layoutDebugPageCenter" role="tabpanel" data-layout-page="center" hidden>
        <div class="layout-debug-section">中间栏</div>
        <label>
          局数标题中线 Y
          <input type="range" min="-34" max="4" step="1" data-layout-key="roundTitleOffsetY" />
          <output></output>
        </label>
        <label>
          局数字号
          <input type="range" min="8" max="18" step="1" data-layout-key="roundTitleFontSize" />
          <output></output>
        </label>
        <label>
          通关文字中线 Y
          <input type="range" min="-34" max="12" step="1" data-layout-key="sectionLabelOffsetY" />
          <output></output>
        </label>
        <label>
          通关字号
          <input type="range" min="8" max="16" step="1" data-layout-key="sectionLabelSize" />
          <output></output>
        </label>
        <label>
          比分/胜格中线 Y
          <input type="range" min="-4" max="34" step="1" data-layout-key="scoreRowOffsetY" />
          <output></output>
        </label>
        <label>
          对手栏 X 比
          <input type="range" min="0.08" max="0.42" step="0.01" data-layout-key="aiColumnXRatio" />
          <output></output>
        </label>
        <label>
          玩家栏 X 比
          <input type="range" min="0.58" max="0.94" step="0.01" data-layout-key="playerColumnXRatio" />
          <output></output>
        </label>
        <label>
          VS 字号
          <input type="range" min="10" max="24" step="1" data-layout-key="vsSize" />
          <output></output>
        </label>
        <label data-layout-group="widgets">
          比分字号
          <input type="range" min="12" max="32" step="1" data-layout-key="scoreSize" />
          <output></output>
        </label>
        <label>
          胜格边长
          <input type="range" min="10" max="28" step="1" data-layout-key="winSlotSize" />
          <output></output>
        </label>
        <label>
          胜格间距
          <input type="range" min="2" max="20" step="1" data-layout-key="winSlotGap" />
          <output></output>
        </label>
        <label>
          底部说明高度
          <input type="range" min="28" max="64" step="1" data-layout-key="bottomPromptHeight" />
          <output></output>
        </label>
        <label>
          说明与按钮间距
          <input type="range" min="0" max="22" step="1" data-layout-key="bottomPromptGap" />
          <output></output>
        </label>
        <div class="layout-debug-section">底部操作按钮（影响布局高度）</div>
        <label data-layout-group="widgets">
          操作 Y
          <input type="range" min="0.82" max="0.96" step="0.001" data-layout-key="controlYRatio" />
          <output></output>
        </label>
        <label data-layout-group="widgets">
          操作边距
          <input type="range" min="0" max="60" step="1" data-layout-key="controlMargin" />
          <output></output>
        </label>
        <label data-layout-group="widgets">
          操作间距
          <input type="range" min="0" max="40" step="1" data-layout-key="controlGap" />
          <output></output>
        </label>
        <label data-layout-group="widgets">
          操作高度
          <input type="range" min="34" max="72" step="1" data-layout-key="controlHeight" />
          <output></output>
        </label>
      </div>
      <div class="layout-debug-page" id="layoutDebugPageWidgets" role="tabpanel" data-layout-page="widgets" hidden>
        <label>
          中间分值与 VS 间距（水平）
          <input type="range" min="-80" max="80" step="1" data-layout-key="scoreOffsetX" />
          <output></output>
        </label>
        <label>
          筹码 Y
          <input type="range" min="20" max="90" step="1" data-layout-key="scoreOffsetY" />
          <output></output>
        </label>
        <label>
          筹码字号
          <input type="range" min="12" max="32" step="1" data-layout-key="scoreSize" />
          <output></output>
        </label>
        <label>
          牌组右距
          <input type="range" min="0" max="40" step="1" data-layout-key="pileRightMargin" />
          <output></output>
        </label>
        <label>
          牌组 Y
          <input type="range" min="0" max="60" step="1" data-layout-key="pileTopOffset" />
          <output></output>
        </label>
        <label>
          牌组间距
          <input type="range" min="0" max="24" step="1" data-layout-key="pileGap" />
          <output></output>
        </label>
        <label>
          牌组宽
          <input type="range" min="44" max="90" step="1" data-layout-key="pileWidth" />
          <output></output>
        </label>
        <label>
          牌组高
          <input type="range" min="28" max="60" step="1" data-layout-key="pileHeight" />
          <output></output>
        </label>
      </div>
      <div class="layout-debug-page" id="layoutDebugPageBorders" role="tabpanel" data-layout-page="borders" hidden>
        <label>
          边框宽度
          <input type="range" min="0.5" max="5" step="0.1" data-layout-key="borderWidth" />
          <output></output>
        </label>
        <label>
          圆角值
          <input type="range" min="0" max="16" step="0.5" data-layout-key="cornerRadius" />
          <output></output>
        </label>
        <label>
          外发光
          <input type="range" min="0" max="2.5" step="0.1" data-layout-key="glowBrightness" />
          <output></output>
        </label>
      </div>
      <div class="layout-debug-actions">
        <button type="button" id="layoutDebugApply">应用并保存</button>
      </div>
    </div>
    <script>
      (function () {
        var storageKeys = {
          titleMenu: "cardloot.layout.titleMenu",
          threshold: "cardloot.layout.threshold",
          panels: "cardloot.layout.panels",
          widgets: "cardloot.layout.widgets",
          center: "cardloot.layout.center",
          borders: "cardloot.layout.borders"
        };
        var defaults = {
          titleMenu: {
            logoMaxWidthRatio: 0.78,
            logoMaxWidthCap: 320,
            logoTopRatio: 0.105,
            startButtonWidthMode: "draw",
            startButtonHeight: 0,
            startButtonWidth: 0,
            startButtonYRatio: -1,
            startButtonYOffset: 0,
            startButtonCenterXRatio: -1,
            fallbackLogoTextWhenNoImage: "",
            showBootstrapLoadingHint: 0,
            bootstrapLoadingHintYRatio: 0.552,
            bootstrapLoadingHintSize: 13
          },
          threshold: {
            labelOffsetX: 0,
            labelOffsetY: 0,
            pointStartX: 38,
            pointOffsetY: -5,
            pointGap: 24.8,
            pointRadius: 6.8,
            flashRadiusBoost: 1.4
          },
          panels: {
            topMargin: 12,
            sideMargin: 14,
            panelGap: 8,
            controlsYRatio: 0.895,
            centerHRatio: 0.095,
            minCenterH: 64
          },
          widgets: {
            scoreOffsetX: 0,
            scoreOffsetY: 56,
            scoreSize: 20,
            pileRightMargin: 14,
            pileTopOffset: 12,
            pileGap: 6,
            pileWidth: 64,
            pileHeight: 40,
            controlYRatio: 0.895,
            controlMargin: 22,
            controlGap: 12,
            controlHeight: 48
          },
          center: {
            roundTitleY: 18,
            roundTitleOffsetY: -16,
            roundTitleFontSize: 11,
            sectionLabelY: 23,
            sectionLabelOffsetY: -16,
            sectionLabelSize: 10,
            winRowYRatio: 0.66,
            scoreRowOffsetY: 13,
            aiColumnXRatio: 0.14,
            playerColumnXRatio: 0.86,
            vsSize: 15,
            winSlotSize: 17,
            winSlotGap: 8,
            bottomPromptHeight: 46,
            bottomPromptGap: 8
          },
          borders: {
            borderWidth: 2,
            cornerRadius: 7,
            glowBrightness: 1
          }
        };

        function loadLayout(group) {
          try {
            var saved = JSON.parse(localStorage.getItem(storageKeys[group]) || "{}");
            if (group === "threshold") {
              if (saved.pointGap === 23.4) {
                saved.pointGap = defaults.threshold.pointGap;
              }
              if (saved.pointRadius === 5.8) {
                saved.pointRadius = defaults.threshold.pointRadius;
              }
            } else if (group === "center") {
              if (saved.aiColumnXRatio === 0.1) {
                saved.aiColumnXRatio = defaults.center.aiColumnXRatio;
              }
              if (saved.playerColumnXRatio === 0.9) {
                saved.playerColumnXRatio = defaults.center.playerColumnXRatio;
              }
              if (saved.winSlotSize === 16) {
                saved.winSlotSize = defaults.center.winSlotSize;
              }
            }
            return Object.assign({}, defaults[group], saved);
          } catch (error) {
            return Object.assign({}, defaults[group]);
          }
        }

        window.CARDLOOT_LAYOUT_DEBUG = {
          titleMenu: loadLayout("titleMenu"),
          threshold: loadLayout("threshold"),
          panels: loadLayout("panels"),
          widgets: loadLayout("widgets"),
          center: loadLayout("center"),
          borders: loadLayout("borders")
        };
        window.CARDLOOT_LAYOUT_DEBUG_DEFAULTS = {
          titleMenu: Object.assign({}, defaults.titleMenu),
          threshold: Object.assign({}, defaults.threshold),
          panels: Object.assign({}, defaults.panels),
          widgets: Object.assign({}, defaults.widgets),
          center: Object.assign({}, defaults.center),
          borders: Object.assign({}, defaults.borders),
          storageKeys: storageKeys
        };
      })();
    </script>
    <script src="./js/dev-tap-mock.js"></script>
    <script src="./game.js"></script>
    <script>
      (function () {
        var panel = document.getElementById("layoutDebugPanel");
        var toggleButton = document.getElementById("layoutDebugToggle");
        var closeButton = document.getElementById("layoutDebugClose");
        var debug = window.CARDLOOT_LAYOUT_DEBUG;
        var defaults = window.CARDLOOT_LAYOUT_DEBUG_DEFAULTS;
        var storageKeys = window.CARDLOOT_LAYOUT_DEBUG_DEFAULTS.storageKeys;
        var panelOpenKey = "cardloot.layout.panelOpen";
        var inputs = Array.prototype.slice.call(panel.querySelectorAll("input[data-layout-key], select[data-layout-key]"));
        var tabs = Array.prototype.slice.call(panel.querySelectorAll("[data-layout-page-target]"));
        var pages = Array.prototype.slice.call(panel.querySelectorAll("[data-layout-page]"));
        var applyButton = document.getElementById("layoutDebugApply");
        var draft = cloneLayouts(debug);

        function loadPanelOpen() {
          try {
            return localStorage.getItem(panelOpenKey) === "true";
          } catch (error) {
            return false;
          }
        }

        function setPanelOpen(isOpen) {
          panel.hidden = !isOpen;
          toggleButton.setAttribute("aria-expanded", String(isOpen));

          try {
            localStorage.setItem(panelOpenKey, String(isOpen));
          } catch (error) {
            return;
          }
        }

        function activatePage(pageName) {
          tabs.forEach(function (tab) {
            var isActive = tab.dataset.layoutPageTarget === pageName;
            tab.classList.toggle("is-active", isActive);
            tab.setAttribute("aria-selected", String(isActive));
          });

          pages.forEach(function (page) {
            page.hidden = page.dataset.layoutPage !== pageName;
          });
        }

        function getInputGroup(input) {
          var groupHost = input.closest("[data-layout-group]");
          if (groupHost && groupHost.getAttribute("data-layout-group")) {
            return groupHost.getAttribute("data-layout-group");
          }
          var page = input.closest("[data-layout-page]");
          return page ? page.dataset.layoutPage : "threshold";
        }

        function save(group) {
          try {
            localStorage.setItem(storageKeys[group], JSON.stringify(debug[group]));
          } catch (error) {
            return false;
          }
          return true;
        }

        function cloneLayouts(source) {
          var result = {};
          Object.keys(storageKeys).forEach(function (group) {
            result[group] = Object.assign({}, defaults[group], source[group] || {});
          });
          return result;
        }

        function applyDraft() {
          inputs.forEach(function (input) {
            applyInputToDraft(input);
          });

          Object.keys(storageKeys).forEach(function (group) {
            debug[group] = Object.assign({}, defaults[group], draft[group] || {});
            save(group);
          });
          draft = cloneLayouts(debug);
          syncControls();
        }

        function formatValue(value, step) {
          var dotIndex = String(step).indexOf(".");
          var decimals = dotIndex === -1 ? 0 : String(step).length - dotIndex - 1;
          return Number(value).toFixed(decimals);
        }

        function updateOutput(input) {
          var out = input.nextElementSibling;
          if (!out || out.tagName !== "OUTPUT") {
            return;
          }

          if (input.tagName === "SELECT") {
            out.textContent = input.value === "full" ? "满宽" : "抽宽";
            return;
          }

          if (input.getAttribute("data-layout-kind") === "text" || input.type === "text" || input.type === "search") {
            var t = String(input.value || "").trim();
            out.textContent = t.length ? String(t.length) + "字" : "空";
            return;
          }

          out.textContent = formatValue(input.value, input.step || "1");
        }

        function applyInputToDraft(input) {
          var group = getInputGroup(input);
          var key = input.dataset.layoutKey;
          if (!key) {
            return;
          }

          if (input.tagName === "SELECT") {
            draft[group][key] = input.value;
          } else if (input.getAttribute("data-layout-kind") === "text" || input.type === "text" || input.type === "search") {
            draft[group][key] = input.value;
          } else {
            draft[group][key] = Number(input.value);
          }

          updateOutput(input);
        }

        function syncControls() {
          inputs.forEach(function (input) {
            var group = getInputGroup(input);
            var key = input.dataset.layoutKey;
            var value = draft[group][key];

            if (input.tagName === "SELECT") {
              input.value =
                value != null && typeof value !== "undefined" && String(value)
                  ? String(value)
                  : "draw";
              if (!Array.prototype.some.call(input.options, function (o) {
                return o.value === input.value;
              })) {
                input.value = "draw";
              }
            } else if (input.getAttribute("data-layout-kind") === "text" || input.type === "text" || input.type === "search") {
              input.value = value == null ? "" : String(value);
            } else if (typeof value !== "undefined" && value !== null && !isNaN(Number(value))) {
              input.value = Number(value);
            } else if (defaults[group][key] != null) {
              input.value = defaults[group][key];
            }

            updateOutput(input);
          });
        }

        inputs.forEach(function (input) {
          input.addEventListener("input", function () {
            applyInputToDraft(input);
          });
          if (input.tagName === "SELECT" || input.type === "text" || input.type === "search" || input.getAttribute("data-layout-kind") === "text") {
            input.addEventListener("change", function () {
              applyInputToDraft(input);
            });
          }
        });

        tabs.forEach(function (tab) {
          tab.addEventListener("click", function () {
            activatePage(tab.dataset.layoutPageTarget);
          });
        });

        toggleButton.addEventListener("click", function () {
          setPanelOpen(panel.hidden);
        });

        closeButton.addEventListener("click", function () {
          setPanelOpen(false);
        });

        applyButton.addEventListener("click", function (event) {
          if (event && event.preventDefault) {
            event.preventDefault();
          }
          applyDraft();
          applyButton.textContent = "已应用";
          window.setTimeout(function () {
            applyButton.textContent = "应用并保存";
          }, 700);
        });

        setPanelOpen(loadPanelOpen());
        activatePage("titleMenu");
        syncControls();
      })();
    </script>
  </body>
</html>
